<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/medtek.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/medtek.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <script>
      window.goatcounter = { no_onload: true };
    
      function gcTrack() {
        if (window.goatcounter && window.goatcounter.count) {
          window.goatcounter.count({
            path: location.pathname + location.search + location.hash
          });
        }
      }
    
      window.addEventListener("load", gcTrack);
      window.addEventListener("hashchange", gcTrack);
    </script>
    
    <script
      data-goatcounter="https://aktiangco.goatcounter.com/count"
      async
      src="https://gc.zgo.at/count.js">
    </script>

    <title>Allan's Projects</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
